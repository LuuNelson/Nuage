<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuage - Bibliothèque de jeux vidéo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');

        body {
            background-color: #1d1d1d;
            color: #f5f5f5;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            text-align: center;
            padding: 60px;
            background-color: #111;
            border-bottom: 2px solid #444;
        }

        h1 {
            font-size: 3em;
            margin: 0;
            color: #ffcc00;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        h2 {
            font-size: 1.5em;
            margin: 10px 0;
            color: #eee;
        }

        nav {
            text-align: center;
            margin: 30px 0;
        }

        nav a {
            color: #f5f5f5;
            text-decoration: none;
            margin: 0 15px;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
            font-weight: 700;
            display: inline-block;
        }

        nav a:hover {
            background-color: #ffcc00;
            color: #1d1d1d;
        }

        main {
            padding: 20px;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 70vh;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #111;
            color: #bbb;
            position: fixed;
            width: 100%;
            bottom: 0;
        }

        .welcome-msg {
            margin: 20px;
            padding: 20px;
            background-color: #333;
            border-radius: 10px;
            color: #ffcc00;
            font-size: 1.2em;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <header>
        <h1>Nuage</h1>
        <h2>Bibliothèque de jeux vidéo</h2>
    </header>

    <nav>
        <a href="accueil"><i class="fas fa-home"></i> Accueil</a>
        <a href="liste_jeux"><i class="fas fa-gamepad"></i> Liste de nos jeux</a>
        <a href="jeuxjoueur"><i class="fas fa-user"></i> Mes jeux</a>
        <a href="amis"><i class="fas fa-users"></i> Amis</a>
        <a href="compte"><i class="fas fa-user-cog"></i> Mon compte</a>
        <a href="deconnexion"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
    </nav>

    <main>
        <div class="welcome-msg">
            Bienvenue {{pseudo}}. Content de vous revoir !
        </div>
    </main>

    <footer>
        <p>&copy; 2023 Nuage. Tous droits réservés.</p>
    </footer>
</body>
</html>
