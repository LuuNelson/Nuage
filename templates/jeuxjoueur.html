<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuage - Mes Jeux</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');

        body {
            background-color: #1d1d1d;
            color: #f5f5f5;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            text-align: center;
            padding: 60px;
            background-color: #111;
            border-bottom: 2px solid #444;
        }

        h1 {
            font-size: 3em;
            margin: 0;
            color: #ffcc00;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        nav {
            text-align: center;
            margin: 30px 0;
        }

        nav a {
            color: #f5f5f5;
            text-decoration: none;
            margin: 0 15px;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
            font-weight: 700;
            display: inline-block;
        }

        nav a:hover {
            background-color: #ffcc00;
            color: #1d1d1d;
        }

        main {
            padding: 20px;
            min-height: 70vh;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        ul li {
            background-color: #333;
            margin: 10px;
            padding: 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        ul li a {
            color: #ffcc00;
            text-decoration: none;
            font-weight: 700;
        }

        ul li:hover {
            background-color: #444;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #111;
            color: #bbb;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Nuage</h1>
        <h2>Mes jeux</h2>
    </header>

    <nav>
        <a href="accueil"><i class="fas fa-home"></i> Accueil</a>
        <a href="liste_jeux"><i class="fas fa-gamepad"></i> Liste de nos jeux</a>
        <a href="jeuxjoueur"><i class="fas fa-user"></i> Mes jeux</a>
        <a href="amis"><i class="fas fa-users"></i> Amis</a>
        <a href="compte"><i class="fas fa-user-cog"></i> Mon compte</a>
        <a href="deconnexion"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
    </nav>

    <main>
        <h2>Jeux de {{ session['login'] }}</h2>
        {% if jeux %}
            <ul>
                {% for jeu in jeux %}
                    <li><a href="jeuxjoueur/{{jeu}}">{{jeu}}</a></li>
                {% endfor %}
            </ul>
        {% else %}
            <p>Vous n'avez pas encore de jeux.</p>
        {% endif %}
    </main>

    <footer>
        <p>&copy; 2023 Nuage. Tous droits réservés.</p>
    </footer>
</body>
</html>
