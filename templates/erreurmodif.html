<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuage - {{head}}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');

        body {
            background-color: #1d1d1d;
            color: #f5f5f5;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            text-align: center;
            padding: 60px;
            background-color: #111;
            border-bottom: 2px solid #444;
        }

        h1 {
            font-size: 3em;
            margin: 0;
            color: #ffcc00;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        h2 {
            font-size: 1.5em;
            margin: 10px 0;
            color: #eee;
        }

        .error-message {
            margin: 40px auto;
            width: 60%;
            background-color: #ff4c4c;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            color: #f5f5f5;
        }

        a {
            color: #ffcc00;
            text-decoration: none;
            transition: color 0.3s;
        }

        a:hover {
            color: #e5b700;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #111;
            color: #bbb;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Nuage</h1>
        <h2>{{titre}}</h2>
    </header>

    <div class="error-message">
        <p>{{message}}</p>
    </div>

    <p>
        Veuillez <a href="compte">réessayer</a>…
    </p>

    <footer>
        <p>&copy; 2023 Nuage. Tous droits réservés.</p>
    </footer>
</body>
</html>
