<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuage - Inscription</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');

        body {
            background-color: #1d1d1d;
            color: #f5f5f5;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            text-align: center;
            padding: 60px;
            background-color: #111;
            border-bottom: 2px solid #444;
        }

        h1 {
            font-size: 3em;
            margin: 0;
            color: #ffcc00;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        h2 {
            font-size: 1.5em;
            margin: 10px 0;
            color: #eee;
        }

        form {
            margin: 40px auto;
            width: 300px;
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        form p {
            margin-bottom: 15px;
        }

        form input[type="text"],
        form input[type="password"],
        form input[type="date"] {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: none;
            border-radius: 5px;
        }

        form input[type="submit"],
        form input[type="reset"] {
            background-color: #ffcc00;
            color: #1d1d1d;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
            margin: 10px 0;
        }

        form input[type="submit"]:hover,
        form input[type="reset"]:hover {
            background-color: #e5b700;
            transform: scale(1.05);
        }

        a {
            color: #ffcc00;
            text-decoration: none;
            transition: color 0.3s;
        }

        a:hover {
            color: #e5b700;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #111;
            color: #bbb;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Nuage</h1>
        <h2>Veuillez vous inscrire</h2>
    </header>

    <form method="post" action="verinscr">
        <p><b>Entrez les informations demandées !</b></p>

        <p>
            <label for="pseudo">Votre pseudo de joueur : </label>
            <input type="text" id="pseudo" name="pseudo" required>
        </p>
        <p>
            <label for="nom">Votre nom : </label>
            <input type="text" id="nom" name="nom" required>
        </p>
        <p>
            <label for="email">Votre adresse e-mail : </label>
            <input type="text" id="email" name="email" required>
        </p>
        <p>
            <br>Votre date de naissance : <input type="date" name="datenaissance" required>
        </p>
        <p>Entrez votre mot de passe : <input type="password" name="mdp1" required></p>
        <p>Confirmez votre mot de passe : <input type="password" name="mdp2" required></p>
        <p>
            <input type="submit" value="Envoyer">
            <input type="reset" value="Réinitialiser">
        </p>
    </form>
    <p><a href="accueil">Retourner à la page d'accueil</a></p>
    <p>Ou <a href="connexion">Connectez-vous</a>!</p>

    <footer>
        <p>&copy; 2023 Nuage. Tous droits réservés.</p>
    </footer>
</body>
</html>
